<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>AI MASTER | Professional Video Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .editor-panel { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 30px; }
        .tool-btn { background: #111; border: 1px solid #222; padding: 12px; border-radius: 12px; text-align: left; font-size: 13px; transition: 0.3s; width: 100%; }
        .tool-btn:hover { background: #222; border-color: #3b82f6; }
        .active { border-color: #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto grid grid-cols-12 gap-6">
        <div class="col-span-3 editor-panel p-6 space-y-4">
            <h2 class="text-blue-500 font-bold mb-6 italic">VIDEO TOOLS</h2>
            
            <button onclick="setTask('cinematic', this)" class="tool-btn active">Cinematic Color Grade</button>
            <button onclick="setTask('text_overlay', this)" class="tool-btn">Add Auto Subtitles</button>
            <button onclick="setTask('black_white', this)" class="tool-btn">Classic Black & White</button>
            <button onclick="setTask('fast_motion', this)" class="tool-btn">2X Fast Motion</button>
            <button onclick="setTask('slowmo', this)" class="tool-btn">Smooth Slow Motion</button>
            <button onclick="setTask('dubbing', this)" class="tool-btn">AI Dubbing (Voice Change)</button>
        </div>

        <div class="col-span-6 space-y-4">
            <div class="editor-panel aspect-video flex items-center justify-center overflow-hidden">
                <video id="preview" class="hidden w-full h-full object-contain" controls></video>
                <div id="msg" class="text-zinc-700 text-sm uppercase tracking-widest">No Asset Loaded</div>
            </div>

            <form id="editorForm" class="editor-panel p-6 grid grid-cols-2 gap-4">
                <input type="file" name="video" class="col-span-2 text-xs text-zinc-500" required>
                <input type="hidden" name="task" id="taskInput" value="cinematic">
                <button type="submit" id="btn" class="col-span-2 bg-blue-600 py-3 rounded-xl font-bold uppercase text-xs tracking-widest">Render Project</button>
            </form>
        </div>

        <div class="col-span-3 editor-panel p-6">
            <h3 class="text-xs text-zinc-500 mb-4 uppercase">Project Info</h3>
            <p class="text-[10px] leading-relaxed text-zinc-400">এখানে আপনার ভিডিওর প্রোপার্টিজ এবং এডিটিং হিস্ট্রি দেখা যাবে। এটি আপনার এডিট করা ভিডিওকে GPU লেভেলে রেন্ডার করে।</p>
        </div>
    </div>

    <script>
        function setTask(task, el) {
            document.getElementById('taskInput').value = task;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('editorForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.innerText = "RENDERING...";
            
            const formData = new FormData(e.target);
            const res = await fetch('/edit', { method: 'POST', body: formData });
            const blob = await res.blob();
            
            document.getElementById('msg').classList.add('hidden');
            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('preview').src = URL.createObjectURL(blob);
            btn.innerText = "RENDER PROJECT";
        };
    </script>
</body>
</html>
