<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudEdit Pro | AI Video Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .upload-glow { border: 1px dashed #333; transition: 0.4s; }
        .upload-glow:hover { border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .btn-pay { background: #fff; color: #000; font-weight: bold; border-radius: 50px; padding: 15px 40px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="text-center mb-16">
        <h1 class="text-6xl font-bold tracking-tighter mb-4">AI Mastering.</h1>
        <p class="text-neutral-500 uppercase tracking-widest text-[10px]">195 Countries Support • Instant Dubbing</p>
    </div>

    <div class="w-full max-w-2xl bg-[#0a0a0a] p-10 rounded-[40px] border border-white/5">
        <form action="/edit" method="POST" enctype="multipart/form-data">
            <div class="upload-glow h-60 rounded-3xl flex flex-col items-center justify-center mb-10 cursor-pointer">
                <input type="file" name="video" class="absolute opacity-0 h-60 w-full cursor-pointer" required>
                <p class="text-sm text-neutral-400">ভিডিও ফাইল এখানে ড্রপ করুন</p>
            </div>

            <input type="text" name="text" placeholder="Overlay Text" class="w-full bg-transparent border-b border-neutral-800 py-4 mb-10 outline-none focus:border-white">
            
            <div class="flex flex-col gap-4">
                <button type="submit" class="btn-pay hover:bg-neutral-200 transition">প্রসেস শুরু করুন (ফ্রি)</button>
                <button type="button" onclick="location.href='/create-checkout-session'" class="text-[10px] text-neutral-600 uppercase tracking-widest hover:text-white transition">Get Pro - $5 (Remove Watermark)</button>
            </div>
        </form>
    </div>

    <footer class="mt-20 text-[9px] text-neutral-800 tracking-[0.5em] font-bold">
        PAYPAL & STRIPE SECURED • GOOGLE CLOUD STORAGE ACTIVE
    </footer>

</body>
</html>
